<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment Instruction Integrity — Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #c0c0c0; min-height: 100vh; padding: 32px 48px; }
  h1 { font-size: 22px; color: #fff; margin-bottom: 6px; font-weight: 700; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; max-width: 700px; line-height: 1.5; }

  /* Scenario picker */
  .scenarios { display: flex; gap: 16px; margin-bottom: 24px; }
  .scenario-btn { flex: 1; max-width: 360px; padding: 20px; border: 2px solid #222; border-radius: 12px; background: #111; cursor: pointer; transition: all 0.2s; text-align: left; }
  .scenario-btn:hover { border-color: #444; background: #1a1a1a; }
  .scenario-btn.selected { border-color: #5b5bff; background: #111133; }
  .scenario-btn.active-good { border-color: #4caf50; }
  .scenario-btn.active-bad { border-color: #f44336; }
  .scenario-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .scenario-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .scenario-desc { font-size: 13px; color: #888; line-height: 1.4; }
  .scenario-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }
  .tag-safe { background: #112211; color: #4caf50; }
  .tag-attack { background: #331111; color: #f44336; }

  /* Action button */
  .action-bar { margin-bottom: 32px; }
  .btn-action { padding: 12px 32px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-primary { background: #5b5bff; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #4a4aee; }
  .btn-continue { background: #333; color: #fff; }
  .btn-continue:hover:not(:disabled) { background: #444; }
  .btn-restart { background: #222; color: #aaa; margin-left: 12px; }
  .btn-restart:hover:not(:disabled) { background: #333; }

  /* Step log */
  .step-log { max-width: 800px; }
  .log-entry { margin-bottom: 16px; border-left: 3px solid #222; padding: 12px 16px; background: #111; border-radius: 0 8px 8px 0; animation: fadeIn 0.3s ease; }
  .log-entry.success { border-left-color: #4caf50; }
  .log-entry.fail { border-left-color: #f44336; }
  .log-entry.active { border-left-color: #5b5bff; }
  .log-step-num { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .log-step-num.success { color: #4caf50; }
  .log-step-num.fail { color: #f44336; }
  .log-step-num.active { color: #5b5bff; }
  .log-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .log-body { font-size: 14px; color: #aaa; line-height: 1.6; }
  .log-body .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #ccc; background: #0a0a0a; padding: 2px 6px; border-radius: 4px; }
  .log-body .bad { color: #f44336; font-weight: 700; }
  .log-body .good { color: #4caf50; font-weight: 700; }
  .log-detail { margin-top: 8px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 6px; padding: 10px 12px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #888; white-space: pre-wrap; word-break: break-all; }

  .final-result { margin-top: 20px; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: 700; text-align: center; }
  .final-result.success { background: #0d1a0d; border: 2px solid #1a3a1a; color: #4caf50; }
  .final-result.fail { background: #1a0d0d; border: 2px solid #3a1a1a; color: #f44336; }
  .final-result .detail { font-size: 13px; font-weight: 400; color: #888; margin-top: 6px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<h1>Payment Instruction Integrity</h1>
<p class="subtitle">When an AI agent pays for a service, how does the wallet know the payment instruction hasn't been tampered with? This demo shows how <strong>did:web</strong> signatures protect against compromised agents.</p>

<!-- Scenario picker -->
<div class="scenarios" id="scenarios">
  <button class="scenario-btn" id="btn-legit" onclick="selectScenario(false)">
    <span class="scenario-tag tag-safe">LEGITIMATE</span>
    <div class="scenario-title">Normal payment flow</div>
    <div class="scenario-desc">Server signs the payment instruction. Agent verifies the signature matches. Wallet proceeds to sign.</div>
  </button>
  <button class="scenario-btn" id="btn-tamper" onclick="selectScenario(true)">
    <span class="scenario-tag tag-attack">ATTACK</span>
    <div class="scenario-title">Compromised agent swaps payTo</div>
    <div class="scenario-desc">A malicious plugin changes the recipient address after the server's 402 response. The signature won't match.</div>
  </button>
</div>

<!-- Action button -->
<div class="action-bar" id="action-bar">
  <button class="btn-action btn-primary" id="btn-main" disabled onclick="handleAction()">Select a scenario to begin</button>
</div>

<!-- Step-by-step log -->
<div class="step-log" id="step-log"></div>

<script>
const NETWORK_NAMES = {
  'eip155:8453': 'Base',
  'eip155:1': 'Ethereum',
  'eip155:84532': 'Base Sepolia',
  'eip155:137': 'Polygon',
  'eip155:42161': 'Arbitrum',
  'eip155:10': 'Optimism',
};

let selectedTamper = null;
let currentPhase = 'select'; // select | ready | running | step-pause | done
let pendingEvents = [];
let stepCount = 0;

// ---- UI helpers ----

function addLogEntry(num, title, body, detail, state) {
  stepCount = num;
  const log = document.getElementById('step-log');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + state;
  entry.id = 'log-' + num;
  entry.innerHTML =
    `<div class="log-step-num ${state}">Step ${num}</div>` +
    `<div class="log-title">${title}</div>` +
    `<div class="log-body">${body}</div>` +
    (detail ? `<div class="log-detail">${detail}</div>` : '');
  log.appendChild(entry);
}

function updateLogState(num, state) {
  const el = document.getElementById('log-' + num);
  if (!el) return;
  el.className = 'log-entry ' + state;
  el.querySelector('.log-step-num').className = 'log-step-num ' + state;
}

function addFinalResult(success, title, detail) {
  const log = document.getElementById('step-log');
  const el = document.createElement('div');
  el.className = 'final-result ' + (success ? 'success' : 'fail');
  el.innerHTML = title + (detail ? `<div class="detail">${detail}</div>` : '');
  log.appendChild(el);
}

function setButton(text, enabled, className) {
  const btn = document.getElementById('btn-main');
  btn.textContent = text;
  btn.disabled = !enabled;
  btn.className = 'btn-action ' + (className || 'btn-primary');
}

function selectScenario(tamper) {
  if (currentPhase !== 'select') return;
  selectedTamper = tamper;
  document.getElementById('btn-legit').className = 'scenario-btn' + (tamper === false ? ' selected' : '');
  document.getElementById('btn-tamper').className = 'scenario-btn' + (tamper === true ? ' selected' : '');
  setButton('Run Demo', true, 'btn-primary');
  currentPhase = 'ready';
}

function handleAction() {
  if (currentPhase === 'ready') {
    startFlow();
  } else if (currentPhase === 'step-pause') {
    advanceToNextStep();
  } else if (currentPhase === 'done') {
    resetAll();
  }
}

function resetAll() {
  currentPhase = 'select';
  selectedTamper = null;
  stepCount = 0;
  pendingEvents = [];
  document.getElementById('step-log').innerHTML = '';
  document.getElementById('btn-legit').className = 'scenario-btn';
  document.getElementById('btn-tamper').className = 'scenario-btn';
  document.getElementById('btn-legit').disabled = false;
  document.getElementById('btn-tamper').disabled = false;
  setButton('Select a scenario to begin', false, 'btn-primary');
}

// ---- Flow control ----

async function startFlow() {
  currentPhase = 'running';
  document.getElementById('btn-legit').disabled = true;
  document.getElementById('btn-tamper').disabled = true;
  setButton('Running...', false, 'btn-primary');

  if (selectedTamper) {
    document.getElementById('btn-tamper').className = 'scenario-btn active-bad';
  } else {
    document.getElementById('btn-legit').className = 'scenario-btn active-good';
  }

  // Trigger the server-side flow
  try {
    await fetch('/api/trigger', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tamper: selectedTamper }),
    });
  } catch (err) {
    addLogEntry(1, 'Error', 'Failed to connect to demo server: ' + err.message, null, 'fail');
    currentPhase = 'done';
    setButton('Start Over', true, 'btn-restart');
  }
}

function pauseForUser(buttonText) {
  currentPhase = 'step-pause';
  setButton(buttonText || 'Continue', true, 'btn-continue');
}

function advanceToNextStep() {
  currentPhase = 'running';
  setButton('Running...', false, 'btn-primary');
  if (pendingEvents.length > 0) {
    const next = pendingEvents.shift();
    processEvent(next);
  }
}

// ---- SSE events ----

const evtSource = new EventSource('/events');
evtSource.onmessage = (e) => {
  const data = JSON.parse(e.data);
  if (currentPhase === 'step-pause') {
    pendingEvents.push(data);
  } else {
    processEvent(data);
  }
};

function processEvent(data) {
  switch (data.event) {
    case 'flow_started': {
      addLogEntry(1, 'Agent requests paid resource',
        'The agent makes an HTTP request to the server, expecting premium content.',
        `GET http://localhost:3402/paid-content${data.tamper ? '?tamper=true' : ''}`,
        'success'
      );
      pauseForUser('Continue to Step 2');
      break;
    }

    case 'payment_required': {
      const network = NETWORK_NAMES[data.network] || data.network;
      const usdcAmount = (parseInt(data.amount) / 1e6).toFixed(4);
      const isTampered = data.tampered;

      let body = `Server responds with <span class="mono">402 Payment Required</span>. ` +
        `It wants <strong>${usdcAmount} USDC</strong> on <strong>${network}</strong>, ` +
        `paid to <span class="mono">${data.payTo?.slice(0, 14)}...${data.payTo?.slice(-6)}</span>.`;

      body += `<br><br>The server <strong>signs these payment fields</strong> with its ES256 private key ` +
        `and includes the signature in the <span class="mono">X-402-Integrity</span> response header.`;

      if (isTampered) {
        body += `<br><br><span class="bad">But a compromised agent plugin has swapped the payTo address ` +
          `to the attacker's wallet. The payment fields the agent will present no longer match what the server signed.</span>`;
      }

      const detail = `Canonical payload (what the server signed):\n` +
        `version:  2\n` +
        `scheme:   exact\n` +
        `network:  ${data.network} (${network})\n` +
        `amount:   ${data.amount} (${usdcAmount} USDC)\n` +
        `asset:    ${data.accept?.asset?.slice(0, 14)}...${data.accept?.asset?.slice(-6)}\n` +
        `payTo:    ${data.payTo}`;

      addLogEntry(2, 'Server returns 402 with signed integrity proof', body, detail, 'success');
      pauseForUser('Continue to Step 3');
      break;
    }

    case 'did_resolved': {
      addLogEntry(3, 'Agent resolves the server\'s DID document',
        `The agent fetches <span class="mono">/.well-known/did.json</span> from the server's domain ` +
        `to retrieve the public key. This is the <strong>did:web</strong> standard — ` +
        `the domain itself proves who owns the key. No registry needed.`,
        `DID: ${data.did}\nResolved from: http://localhost:3402/.well-known/did.json\nKey type: ES256 (P-256 elliptic curve)`,
        'success'
      );
      pauseForUser('Continue to Step 4');
      break;
    }

    case 'agent_verifying': {
      addLogEntry(4, 'Agent verifies the signature',
        selectedTamper
          ? `The agent reconstructs the canonical payload from the payment fields in the 402 response, ` +
            `hashes it with SHA-256, and checks the server's signature against the hash. ` +
            `<br><br><span class="bad">Because the payTo address was swapped by the compromised agent, ` +
            `the hash of the tampered fields won't match what the server originally signed.</span>`
          : `The agent reconstructs the canonical payload from the payment fields in the 402 response, ` +
            `hashes it with SHA-256, and verifies the server's signature using the public key from the DID document. ` +
            `<br><br>If the signature matches, the payment fields are <span class="good">authentic and untampered</span>.`,
        null,
        'active'
      );
      // Don't pause here — the result comes immediately
      break;
    }

    case 'integrity_result': {
      if (data.verified) {
        updateLogState(4, 'success');
        addLogEntry(5, 'Wallet signs the payment',
          `<span class="good">Integrity verified.</span> The signature confirms these payment fields came directly from the server ` +
          `and haven't been modified. The Dynamic MPC wallet can safely sign the EIP-712 payment. ` +
          `<br><br>The signed payment is sent back to the server, which verifies and grants access to the content.`,
          `Integrity: VERIFIED\nDID: ${data.did}\nKey: ${data.kid} (${data.alg})\nDomain: ${data.domain}`,
          'success'
        );
        addFinalResult(true, 'PAYMENT INSTRUCTION VERIFIED',
          'The wallet confirmed the instruction is authentic. Funds are sent to the correct recipient.');
      } else {
        updateLogState(4, 'fail');
        addLogEntry(5, 'Wallet REFUSES to sign',
          `<span class="bad">Signature mismatch.</span> The payment fields don't match what the server signed. ` +
          `The payTo address was altered after the server's response — this is a tamper attack. ` +
          `<br><br><strong>Without integrity verification, the wallet would have blindly signed, ` +
          `sending funds to the attacker's address.</strong> With integrity, the attack is caught and blocked.`,
          `Error: ${data.error}`,
          'fail'
        );
        addFinalResult(false, 'TAMPER DETECTED — PAYMENT BLOCKED',
          'The wallet refused to sign. The compromised agent\'s payTo swap was caught by the integrity check.');
      }
      currentPhase = 'done';
      setButton('Start Over', true, 'btn-restart');
      break;
    }

    case 'flow_error': {
      addLogEntry(stepCount + 1, 'Error', data.error, null, 'fail');
      currentPhase = 'done';
      setButton('Start Over', true, 'btn-restart');
      break;
    }

    // server_signed event — skip, covered by payment_required
    default: break;
  }
}
</script>
</body>
</html>
